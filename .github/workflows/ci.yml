name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest
        pip install pyinstaller

    - name: Check code syntax
      run: python -m py_compile main.py

    - name: Run unit tests
      run: python -m pytest test_main.py -v
      continue-on-error: true

    - name: Create test notes file
      run: echo "Test note" > notes.txt

    - name: Test notes loading
      run: |
        python -c "
        from main import HUDWidget
        # This will test loading notes without GUI
        import os
        if os.path.exists('notes.txt'):
            with open('notes.txt', 'r') as f:
                content = f.read()
                print(f'Notes content: {content}')
                print('Notes loading test passed')
        else:
            print('Notes file not found')
        "

    - name: Build EXE
      run: pyinstaller --noconsole --onefile --name "AuraWidget" --add-data "notes.txt;." main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AuraWidget-exe
        path: dist/AuraWidget.exe

    - name: Clean up
      run: |
        Remove-Item -Path notes.txt, config.json, widget.log -ErrorAction SilentlyContinue